name: vital_access
description: "Health triage in your pocket — vitals scan + symptom intake + urgency classification."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Camera & imaging
  camera: ^0.11.0
  image: ^4.2.0

  # Networking
  dio: ^5.7.0

  # State management
  provider: ^6.1.2

  # Utilities
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4

  # UI
  google_fonts: ^6.2.1

  # Export
  pdf: ^3.11.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
